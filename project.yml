name: BodyLog
options:
  bundleIdPrefix: tech.pointone
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_LANGUAGE: zh-Hans
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  BodyLog:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: BodyLog
        excludes:
          - "Info.plist"
    resources:
      - path: BodyLog/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tech.pointone.BodyLog
        PRODUCT_NAME: BodyLog
        INFOPLIST_FILE: BodyLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentBlue
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        GENERATE_INFOPLIST_FILE: NO
